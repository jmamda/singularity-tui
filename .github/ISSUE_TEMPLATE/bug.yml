name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      placeholder: I ran `singularity ...` and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: Profile, prompt, key sequence. The shorter the better.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "singularity --version output"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: ~/.singularity/log/YYYY-MM-DD.jsonl tail, or notifications you saw
      render: shell
