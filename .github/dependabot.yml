version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      types:
        patterns:
          - "@types/*"
      dev-tooling:
        patterns:
          - "prettier"
          - "tsx"
          - "typescript"
          - "vitest"
          - "@vitest/*"
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
