title: "[Show & Tell] "
labels: [show-and-tell]
body:
  - type: textarea
    id: what
    attributes:
      label: What did you build / use Singularity for?
    validations:
      required: true
  - type: textarea
    id: profile
    attributes:
      label: Your profile (panes + personas)
      description: Paste your `~/.singularity/profiles/<name>.json` if you'd like, or describe.
      render: json
  - type: textarea
    id: aha
    attributes:
      label: The aha moment
      description: What did the multi-agent setup let you do that you couldn't (or wouldn't) with a single CLI?
