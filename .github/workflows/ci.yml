name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch instead of burning the full matrix per push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22', '24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      # lint = prettier --check + tsc --noEmit (format + types enforced in CI)
      - run: npm run lint
      # coverage run enforces the ratchet thresholds in vitest.config.ts
      - run: npm run test:coverage
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: singularity-tui:dev
