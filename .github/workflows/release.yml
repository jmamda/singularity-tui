name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      # Changesets flow: pending changesets → "Version Packages" PR (version
      # also syncs brew/scoop/choco/AUR manifests so they can't drift);
      # merging that PR publishes to npm with provenance and pushes the tag.
      # `changeset publish` (NOT raw `npm publish`) is required: it skips
      # versions that are already on the registry, so pushes to main without
      # pending changesets stay green instead of failing with E403.
      - name: Changesets — version PR / publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
