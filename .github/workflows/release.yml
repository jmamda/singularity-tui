name: Release

on:
  push:
    branches: [main]

# Least privilege: id-token (provenance) not needed while publishing is off.
permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      # Version-PR mode only: creates/updates a "Version Packages" PR from
      # pending changesets. npm publishing is intentionally disabled while the
      # repo is private — `--provenance` requires a public repo, and an
      # unscoped package cannot be published with restricted access. When the
      # project goes public, restore:
      #   publish: npm publish --provenance --access public
      - name: Changesets — version PR
        uses: changesets/action@v1
        with:
          version: npx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
