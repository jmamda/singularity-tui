name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      # Changesets flow: pending changesets → "Version Packages" PR (version
      # also syncs brew/scoop/choco/AUR manifests so they can't drift);
      # merging that PR publishes to npm with provenance. Requires the
      # NPM_TOKEN repo secret (granular, publish-only).
      - name: Changesets — version PR / publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm publish --provenance --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
