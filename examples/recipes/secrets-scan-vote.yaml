name: secrets-scan-vote
description: Quorum-vote each secrets-scan finding to suppress false positives
usecase: 17
steps:
  - do: "!scan for secrets in src/** - list each candidate as FINDING <file>:<line> <kind>"
  - do: "?for each FINDING vote REAL or FALSE-POSITIVE with one-line reason"
  - do: "@plan compile only REAL findings into a remediation checklist grouped by file"
  - do: "/share secrets-{{date}}.md"
    target: 1
